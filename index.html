<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#161a24">
<title>Uke Studio</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script>
if ("serviceWorker" in navigator) { window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); }); }
</script>
<script>
(function () {
  function show(msg) {
    try {
      var d = document.getElementById("uke-error-banner");
      if (!d) {
        d = document.createElement("div");
        d.id = "uke-error-banner";
        d.style.cssText = "position:fixed;top:0;left:0;right:0;background:#b3261e;color:#fff;padding:10px 12px;font:12px/1.5 monospace;z-index:2147483647;white-space:pre-wrap;max-height:45vh;overflow:auto";
        document.body.appendChild(d);
      }
      d.textContent += (d.textContent ? "\n" : "") + "⚠️ " + msg + "\n(montre cette capture à Claude)";
    } catch (e) {}
  }
  window.addEventListener("error", function (e) {
    show("Erreur : " + (e.message || e.error) + (e.filename ? "\n" + e.filename.split("/").pop() + " : ligne " + e.lineno + ":" + e.colno : ""));
  });
  window.addEventListener("unhandledrejection", function (e) {
    var r = e.reason || {};
    show("Promesse rejetée : " + (r.message || String(r)) + (r.stack ? "\n" + String(r.stack).split("\n").slice(0, 3).join("\n") : ""));
  });
})();
if (!window.storage) {
  window.storage = {
    get: async (k) => { const v = localStorage.getItem(k); return v === null ? null : { key: k, value: v }; },
    set: async (k, v) => { localStorage.setItem(k, v); return { key: k, value: v }; },
    delete: async (k) => { localStorage.removeItem(k); return { key: k, deleted: true }; },
  };
}
</script>
<style>html,body{margin:0;padding:0;background:#161a24}#root{min-height:100vh}</style>
</head>
<body>
<div id="root"></div>
<script src="vendor-react.js"></script>
<script src="app-bundle.js"></script>
</body>
</html>
