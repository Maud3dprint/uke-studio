<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Uke Studio</title>
<meta name="theme-color" content="#0e1220" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-512.png" />
<link rel="apple-touch-icon" href="icon-512.png" />
<style>html,body{margin:0;padding:0;background:#0e1220}#root{min-height:100vh}
#err{display:none;position:fixed;inset:0;background:#1a0e0e;color:#ffb4b4;padding:20px;font:13px monospace;white-space:pre-wrap;z-index:99;overflow:auto}</style>
</head>
<body>
<div id="root"></div>
<div id="err"></div>
<script>
// Filet de sécurité : toute erreur s'affiche en clair au lieu d'un écran noir
window.onerror = function(m, s, l, c, e){ var d=document.getElementById('err'); d.style.display='block';
  d.textContent = "Erreur : " + m + "\n" + (e && e.stack ? e.stack : (s+":"+l)); };
// Stockage persistant local (imports, favoris, thème, niveau mémoire)
window.storage = {
  get: function(k){ var v = localStorage.getItem(k); return v===null ? Promise.reject(new Error("clé absente")) : Promise.resolve({ key:k, value:v }); },
  set: function(k,v){ localStorage.setItem(k,v); return Promise.resolve({ key:k, value:v }); },
  "delete": function(k){ localStorage.removeItem(k); return Promise.resolve({ key:k, deleted:true }); },
  list: function(p){ return Promise.resolve({ keys: Object.keys(localStorage).filter(function(k){return !p||k.indexOf(p)===0;}) }); },
};
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
</script>
